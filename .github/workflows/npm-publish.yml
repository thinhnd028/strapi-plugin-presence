# This workflow will build and publish the package to npm with provenance when a release is created.
# Provenance: https://docs.npmjs.com/generating-provenance-statements
# Publishing: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish to npm

on:
    release:
        types: [created]

jobs:
    publish-npm:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write   # Required for provenance attestation (OIDC)
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org/"
            - run: npm ci
            - run: npm run build
            - run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
